services:
  postgres:
    image: postgres:16-alpine
    container_name: signaldesk-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_MIGRATOR_USER: ${POSTGRES_MIGRATOR_USER}
      POSTGRES_MIGRATOR_PASSWORD: ${POSTGRES_MIGRATOR_PASSWORD}
      POSTGRES_READONLY_USER: ${POSTGRES_READONLY_USER}
      POSTGRES_READONLY_PASSWORD: ${POSTGRES_READONLY_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - signaldesk-internal

  api:
    build:
      context: ../../services/api
      dockerfile: Dockerfile
    container_name: signaldesk-api
    restart: unless-stopped
    environment:
      SIGNALDESK_APP_DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2)\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - signaldesk-internal

  jobs:
    build:
      context: ../../services/jobs
      dockerfile: Dockerfile
    container_name: signaldesk-jobs
    restart: unless-stopped
    environment:
      SIGNALDESK_MIGRATOR_DATABASE_URL: postgresql://${POSTGRES_MIGRATOR_USER}:${POSTGRES_MIGRATOR_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SIGNALDESK_APP_DATABASE_URL: postgresql://${POSTGRES_APP_USER}:${POSTGRES_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SIGNALDESK_ALERT_DELTA_THRESHOLD: ${SIGNALDESK_ALERT_DELTA_THRESHOLD:-2.0}
      JOBS_INTERVAL_SECONDS: ${JOBS_INTERVAL_SECONDS:-1800}
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          python -m signaldesk_jobs.main run-once
          sleep "${JOBS_INTERVAL_SECONDS}"
        done
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, psycopg; conn=psycopg.connect(os.environ['SIGNALDESK_APP_DATABASE_URL']); conn.execute('SELECT 1').fetchone(); conn.close()\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - signaldesk-internal

networks:
  signaldesk-internal:
    driver: bridge

volumes:
  postgres-data:

